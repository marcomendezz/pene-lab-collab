<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pene Lab — Bot Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; }
        .header { background: #161b22; border-bottom: 1px solid #30363d; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
        .header h1 { font-size: 20px; background: linear-gradient(90deg, #00d2ff, #7b2ff7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header .status { font-size: 12px; color: #8b949e; display: flex; align-items: center; gap: 12px; }
        .header .status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #3fb950; margin-right: 4px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
        .user-badge { background: #238636; color: white; padding: 2px 8px; border-radius: 10px; font-size: 11px; cursor: pointer; }
        .user-badge.disconnected { background: #30363d; color: #8b949e; }
        .refresh-btn { background: none; border: 1px solid #30363d; color: #8b949e; border-radius: 6px; padding: 4px 8px; cursor: pointer; font-size: 12px; }
        .refresh-btn:hover { border-color: #58a6ff; color: #58a6ff; }

        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px; max-width: 1400px; margin: 0 auto; height: calc(100vh - 60px); }
        .panel { background: #161b22; border: 1px solid #30363d; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { padding: 12px 16px; border-bottom: 1px solid #30363d; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .panel-body { flex: 1; overflow-y: auto; padding: 12px; }

        /* Chat messages with avatars */
        .chat-msg { margin-bottom: 16px; display: flex; gap: 10px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .avatar { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; border: 2px solid; }
        .avatar.jarvis { background: #1a2744; border-color: #00d2ff; color: #00d2ff; }
        .avatar.hermes { background: #2a1a44; border-color: #7b2ff7; color: #7b2ff7; }
        .avatar.gonzalo { background: #1a3a2a; border-color: #d2a8ff; color: #d2a8ff; }
        .avatar.marco { background: #1a3a2a; border-color: #7ee787; color: #7ee787; }
        .avatar.human { background: #2a2a2a; border-color: #8b949e; color: #8b949e; }
        .msg-bubble { flex: 1; padding: 8px 12px; border-radius: 12px; border-top-left-radius: 2px; background: #0d1117; border: 1px solid #30363d; }
        .msg-bubble.jarvis { border-color: #00d2ff33; background: #0d1520; }
        .msg-bubble.hermes { border-color: #7b2ff733; background: #150d20; }
        .msg-bubble.gonzalo { border-color: #d2a8ff33; }
        .msg-bubble.marco { border-color: #7ee78733; }
        .msg-bubble .agent { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
        .msg-bubble.jarvis .agent { color: #00d2ff; }
        .msg-bubble.hermes .agent { color: #7b2ff7; }
        .msg-bubble.gonzalo .agent { color: #d2a8ff; }
        .msg-bubble.marco .agent { color: #7ee787; }
        .msg-bubble .time { color: #8b949e; font-size: 10px; float: right; margin-top: 2px; }
        .msg-bubble .text { font-size: 13px; line-height: 1.5; }

        /* Typing indicator */
        .typing { display: flex; gap: 4px; padding: 8px 12px; align-items: center; }
        .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: #8b949e; animation: typingBounce 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

        /* Commits */
        .commit { padding: 8px 0; border-bottom: 1px solid #21262d; font-size: 13px; }
        .commit:last-child { border-bottom: none; }
        .commit .sha { color: #58a6ff; font-family: monospace; font-size: 12px; }
        .commit .msg { color: #c9d1d9; }
        .commit .meta { color: #8b949e; font-size: 11px; margin-top: 4px; }
        .task { padding: 6px 0; font-size: 13px; }
        .task.done { color: #8b949e; text-decoration: line-through; }

        /* Chat input */
        .chat-input { display: flex; padding: 8px; border-top: 1px solid #30363d; gap: 8px; }
        .chat-input input { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 8px 12px; color: #c9d1d9; font-size: 13px; outline: none; }
        .chat-input input:focus { border-color: #58a6ff; }
        .chat-input button { background: linear-gradient(135deg, #00d2ff, #7b2ff7); color: white; border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 13px; font-weight: 600; }
        .chat-input button:disabled { opacity: 0.5; cursor: not-allowed; }
        .sending-indicator { color: #58a6ff; font-size: 12px; display: none; padding: 4px 8px; }
        .sending-indicator.active { display: block; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; top:0;left:0;right:0;bottom:0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 24px; width: 400px; max-width: 90vw; }
        .modal h2 { color: #58a6ff; margin-bottom: 16px; font-size: 18px; }
        .modal p { color: #8b949e; font-size: 13px; margin-bottom: 12px; line-height: 1.5; }
        .modal label { display: block; color: #c9d1d9; font-size: 13px; margin-bottom: 4px; font-weight: 600; }
        .modal input, .modal select { width: 100%; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 8px 12px; color: #c9d1d9; font-size: 13px; margin-bottom: 12px; outline: none; }
        .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px; }
        .modal-actions button { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; }
        .btn-primary { background: linear-gradient(135deg, #00d2ff, #7b2ff7); color: white; }
        .btn-secondary { background: #21262d; color: #c9d1d9; border: 1px solid #30363d !important; }

        .loading { text-align: center; color: #8b949e; padding: 20px; }
        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="modal-overlay" id="auth-modal">
        <div class="modal">
            <h2>Connect to Chat</h2>
            <p>Para enviar mensajes necesitas un GitHub Personal Access Token con permiso <strong>repo</strong>.</p>
            <p>Crealo en: <a href="https://github.com/settings/tokens/new?scopes=repo&description=PeneLab+Dashboard" target="_blank" style="color:#58a6ff">github.com/settings/tokens</a></p>
            <label>Tu nombre</label>
            <select id="auth-name">
                <option value="">-- Selecciona --</option>
                <option value="Gonzalo">Gonzalo</option>
                <option value="Marco">Marco</option>
            </select>
            <label>GitHub Token</label>
            <input type="password" id="auth-token" placeholder="ghp_xxxxxxxxxxxx">
            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeAuthModal()">Cancel</button>
                <button class="btn-primary" onclick="saveAuth()">Connect</button>
            </div>
        </div>
    </div>

    <div class="header">
        <h1>PENE LAB</h1>
        <div class="status">
            <span class="dot"></span> Live (auto-refresh 15s)
            <span id="user-badge" class="user-badge disconnected" onclick="openAuthModal()">Connect</span>
            <button class="refresh-btn" onclick="refreshAll()">Refresh</button>
        </div>
    </div>
    <div class="container">
        <div class="panel">
            <div class="panel-header">Bot Chat</div>
            <div class="panel-body" id="chat-body"><div class="loading">Loading...</div></div>
            <div class="sending-indicator" id="sending">Sending...</div>
            <div class="chat-input">
                <input type="text" id="chat-msg" placeholder="Connect first" disabled onkeydown="if(event.key==='Enter')sendMessage()">
                <button id="send-btn" onclick="sendMessage()" disabled>Send</button>
            </div>
        </div>
        <div class="panel">
            <div class="panel-header">Recent Commits</div>
            <div class="panel-body" id="commits-body"><div class="loading">Loading...</div></div>
        </div>
        <div class="panel">
            <div class="panel-header">Tasks</div>
            <div class="panel-body" id="tasks-body"><div class="loading">Loading...</div></div>
        </div>
        <div class="panel">
            <div class="panel-header">Project Status</div>
            <div class="panel-body" id="status-body"><div class="loading">Loading...</div></div>
        </div>
    </div>

    <script>
        const OWNER='marcomendezz', REPO='pene-lab-collab', CHAT_PATH='shared-context/chat.md';
        const API=`https://api.github.com/repos/${OWNER}/${REPO}`;
        let authUser=localStorage.getItem('penelab_user')||'', authToken=localStorage.getItem('penelab_token')||'';

        const AVATARS = { jarvis:'J', hermes:'H', gonzalo:'G', marco:'M' };
        const LABELS = { jarvis:'Jarvis', hermes:'Hermes', gonzalo:'Gonzalo', marco:'Marco' };

        function openAuthModal(){document.getElementById('auth-modal').classList.add('active');if(authUser)document.getElementById('auth-name').value=authUser;}
        function closeAuthModal(){document.getElementById('auth-modal').classList.remove('active');}
        function saveAuth(){const n=document.getElementById('auth-name').value,t=document.getElementById('auth-token').value.trim();if(!n||!t){alert('Fill both fields');return;}authUser=n;authToken=t;localStorage.setItem('penelab_user',n);localStorage.setItem('penelab_token',t);closeAuthModal();updateAuthUI();}
        function updateAuthUI(){const b=document.getElementById('user-badge'),i=document.getElementById('chat-msg'),s=document.getElementById('send-btn');if(authUser&&authToken){b.textContent=authUser;b.classList.remove('disconnected');i.disabled=false;i.placeholder=`Message as ${authUser}...`;s.disabled=false;}else{b.textContent='Connect';b.classList.add('disconnected');i.disabled=true;i.placeholder='Connect first';s.disabled=true;}}

        async function sendMessage(){const i=document.getElementById('chat-msg'),m=i.value.trim();if(!m||!authToken)return;const b=document.getElementById('send-btn'),ind=document.getElementById('sending');i.disabled=true;b.disabled=true;ind.classList.add('active');try{const fr=await fetch(`${API}/contents/${CHAT_PATH}`,{headers:{'Authorization':`Bearer ${authToken}`,'Accept':'application/vnd.github.v3+json'}});if(!fr.ok)throw new Error('Cannot read');const fd=await fr.json(),cur=atob(fd.content.replace(/\n/g,'')),sha=fd.sha;const now=new Date(),ts=now.toLocaleString('en-CA',{timeZone:'America/Mexico_City',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:false}).replace(',','');const nl=`\n[${ts} CST] ${authUser.toUpperCase()}: ${m}\n`,nc=cur.trimEnd()+'\n'+nl;const ur=await fetch(`${API}/contents/${CHAT_PATH}`,{method:'PUT',headers:{'Authorization':`Bearer ${authToken}`,'Content-Type':'application/json','Accept':'application/vnd.github.v3+json'},body:JSON.stringify({message:`${authUser}: ${m.substring(0,50)}`,content:btoa(unescape(encodeURIComponent(nc))),sha:sha,committer:{name:authUser,email:`${authUser.toLowerCase()}@penelab.local`}})});if(!ur.ok)throw new Error((await ur.json()).message);i.value='';await refreshAll();}catch(e){alert('Error: '+e.message);}finally{i.disabled=false;b.disabled=false;ind.classList.remove('active');i.focus();}}

        function getHeaders(){const h={'Accept':'application/vnd.github.v3.raw'};if(authToken)h['Authorization']=`Bearer ${authToken}`;return h;}
        async function fetchFile(p){try{const r=await fetch(`${API}/contents/${p}`,{headers:getHeaders()});return r.ok?await r.text():null;}catch(e){return null;}}
        async function fetchCommits(){try{const h={};if(authToken)h['Authorization']=`Bearer ${authToken}`;const r=await fetch(`${API}/commits?per_page=15`,{headers:h});return r.ok?await r.json():[];}catch(e){return[];}}

        function parseChat(t){if(!t)return[];return t.split('\n').map(l=>{const m=l.match(/^\[(.+?)\]\s+(\w+):\s+(.+)$/);return m?{time:m[1],agent:m[2],text:m[3]}:null;}).filter(Boolean);}
        function cls(a){const l=a.toLowerCase();return['jarvis','hermes','gonzalo','marco'].includes(l)?l:'human';}
        function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML;}

        function renderChat(msgs){const el=document.getElementById('chat-body');if(!msgs.length){el.innerHTML='<div class="loading">No messages yet</div>';return;}
        el.innerHTML=msgs.map(m=>{const c=cls(m.agent),av=AVATARS[c]||m.agent[0],lb=LABELS[c]||m.agent;return`<div class="chat-msg"><div class="avatar ${c}">${av}</div><div class="msg-bubble ${c}"><div class="agent">${esc(lb)} <span class="time">${esc(m.time)}</span></div><div class="text">${esc(m.text)}</div></div></div>`;}).join('');el.scrollTop=el.scrollHeight;}

        function renderCommits(c){const el=document.getElementById('commits-body');if(!c.length){el.innerHTML='<div class="loading">No commits</div>';return;}
        el.innerHTML=c.map(x=>`<div class="commit"><span class="sha">${x.sha.substring(0,7)}</span> <span class="msg">${esc(x.commit.message)}</span><div class="meta">${esc(x.commit.author.name)} - ${new Date(x.commit.author.date).toLocaleString()}</div></div>`).join('');}

        function renderMd(t,id){const el=document.getElementById(id);if(!t){el.innerHTML='<div class="loading">Not found</div>';return;}
        el.innerHTML=t.replace(/^### (.+)$/gm,'<h3 style="color:#58a6ff;margin:8px 0">$1</h3>').replace(/^## (.+)$/gm,'<h2 style="color:#58a6ff;margin:12px 0;font-size:16px">$1</h2>').replace(/^# (.+)$/gm,'<h1 style="color:#58a6ff;margin:12px 0;font-size:18px">$1</h1>').replace(/^- \[x\] (.+)$/gm,'<div class="task done">Done: $1</div>').replace(/^- \[ \] (.+)$/gm,'<div class="task">Todo: $1</div>').replace(/^- (.+)$/gm,'<div style="padding:2px 0;font-size:13px">$1</div>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');}

        async function refreshAll(){const[ch,co,ta,st]=await Promise.all([fetchFile('shared-context/chat.md'),fetchCommits(),fetchFile('shared-context/tasks.md'),fetchFile('shared-context/status.md')]);renderChat(parseChat(ch));renderCommits(co);renderMd(ta,'tasks-body');renderMd(st,'status-body');}

        updateAuthUI();refreshAll();setInterval(refreshAll,15000);
    </script>
</body>
</html>
