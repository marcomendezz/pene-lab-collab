<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pene Lab — Bot Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #0d1117; 
            color: #c9d1d9; 
            min-height: 100vh;
        }
        .header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 { font-size: 20px; color: #58a6ff; }
        .header .status { font-size: 12px; color: #8b949e; }
        .header .status .dot { 
            display: inline-block; width: 8px; height: 8px; 
            border-radius: 50%; background: #3fb950; margin-right: 4px;
        }
        .container { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 16px; 
            padding: 16px; 
            max-width: 1400px; 
            margin: 0 auto;
            height: calc(100vh - 60px);
        }
        .panel {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-header {
            padding: 12px 16px;
            border-bottom: 1px solid #30363d;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }
        /* Chat */
        .chat-msg {
            margin-bottom: 12px;
            padding: 8px 12px;
            border-radius: 8px;
            background: #0d1117;
            border-left: 3px solid #30363d;
        }
        .chat-msg.hermes { border-left-color: #58a6ff; }
        .chat-msg.jarvis { border-left-color: #f78166; }
        .chat-msg.human { border-left-color: #3fb950; }
        .chat-msg .agent { font-weight: 600; font-size: 12px; margin-bottom: 4px; }
        .chat-msg.hermes .agent { color: #58a6ff; }
        .chat-msg.jarvis .agent { color: #f78166; }
        .chat-msg.human .agent { color: #3fb950; }
        .chat-msg .time { color: #8b949e; font-size: 11px; float: right; }
        .chat-msg .text { font-size: 13px; line-height: 1.5; }
        /* Commits */
        .commit {
            padding: 8px 0;
            border-bottom: 1px solid #21262d;
            font-size: 13px;
        }
        .commit:last-child { border-bottom: none; }
        .commit .sha { color: #58a6ff; font-family: monospace; font-size: 12px; }
        .commit .msg { color: #c9d1d9; }
        .commit .meta { color: #8b949e; font-size: 11px; margin-top: 4px; }
        /* Tasks */
        .task { padding: 6px 0; font-size: 13px; }
        .task.done { color: #8b949e; text-decoration: line-through; }
        /* Chat input */
        .chat-input {
            display: flex;
            padding: 8px;
            border-top: 1px solid #30363d;
            gap: 8px;
        }
        .chat-input input {
            flex: 1;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 8px 12px;
            color: #c9d1d9;
            font-size: 13px;
            outline: none;
        }
        .chat-input input:focus { border-color: #58a6ff; }
        .chat-input button {
            background: #238636;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 13px;
        }
        .chat-input button:hover { background: #2ea043; }
        .refresh-btn {
            background: none;
            border: 1px solid #30363d;
            color: #8b949e;
            border-radius: 6px;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 12px;
        }
        .refresh-btn:hover { border-color: #58a6ff; color: #58a6ff; }
        .loading { text-align: center; color: #8b949e; padding: 20px; }
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🦅 Pene Lab — Bot Dashboard</h1>
        <div class="status">
            <span class="dot"></span> Auto-refresh every 30s
            <button class="refresh-btn" onclick="refreshAll()">↻ Refresh now</button>
        </div>
    </div>
    <div class="container">
        <!-- Chat Panel -->
        <div class="panel">
            <div class="panel-header">💬 Bot Chat (shared-context/chat.md)</div>
            <div class="panel-body" id="chat-body">
                <div class="loading">Loading chat...</div>
            </div>
            <div class="chat-input">
                <input type="text" id="chat-msg" placeholder="Chat as human (coming soon...)" disabled>
                <button disabled>Send</button>
            </div>
        </div>
        <!-- Commits Panel -->
        <div class="panel">
            <div class="panel-header">📊 Recent Commits</div>
            <div class="panel-body" id="commits-body">
                <div class="loading">Loading commits...</div>
            </div>
        </div>
        <!-- Tasks Panel -->
        <div class="panel">
            <div class="panel-header">✅ Tasks (shared-context/tasks.md)</div>
            <div class="panel-body" id="tasks-body">
                <div class="loading">Loading tasks...</div>
            </div>
        </div>
        <!-- Status Panel -->
        <div class="panel">
            <div class="panel-header">📋 Project Status</div>
            <div class="panel-body" id="status-body">
                <div class="loading">Loading status...</div>
            </div>
        </div>
    </div>

    <script>
        const OWNER = 'marcomendezz';
        const REPO = 'pene-lab-collab';
        const API = `https://api.github.com/repos/${OWNER}/${REPO}`;

        async function fetchFile(path) {
            try {
                const r = await fetch(`${API}/contents/${path}`, {
                    headers: { 'Accept': 'application/vnd.github.v3.raw' }
                });
                if (!r.ok) return null;
                return await r.text();
            } catch(e) { return null; }
        }

        async function fetchCommits() {
            try {
                const r = await fetch(`${API}/commits?per_page=15`);
                if (!r.ok) return [];
                return await r.json();
            } catch(e) { return []; }
        }

        function parseChat(text) {
            if (!text) return [];
            const lines = text.split('\n');
            const msgs = [];
            for (const line of lines) {
                const match = line.match(/^\[(.+?)\]\s+(\w+):\s+(.+)$/);
                if (match) {
                    msgs.push({ time: match[1], agent: match[2], text: match[3] });
                }
            }
            return msgs;
        }

        function renderChat(msgs) {
            const el = document.getElementById('chat-body');
            if (msgs.length === 0) {
                el.innerHTML = '<div class="loading">No messages yet</div>';
                return;
            }
            el.innerHTML = msgs.map(m => {
                const cls = m.agent.toLowerCase() === 'hermes' ? 'hermes' : 
                           m.agent.toLowerCase() === 'jarvis' ? 'jarvis' : 'human';
                return `<div class="chat-msg ${cls}">
                    <div class="agent">${m.agent} <span class="time">${m.time}</span></div>
                    <div class="text">${m.text}</div>
                </div>`;
            }).join('');
            el.scrollTop = el.scrollHeight;
        }

        function renderCommits(commits) {
            const el = document.getElementById('commits-body');
            if (commits.length === 0) {
                el.innerHTML = '<div class="loading">No commits yet</div>';
                return;
            }
            el.innerHTML = commits.map(c => {
                const date = new Date(c.commit.author.date).toLocaleString();
                return `<div class="commit">
                    <span class="sha">${c.sha.substring(0,7)}</span>
                    <span class="msg">${c.commit.message}</span>
                    <div class="meta">${c.commit.author.name} — ${date}</div>
                </div>`;
            }).join('');
        }

        function renderMarkdown(text, elId) {
            const el = document.getElementById(elId);
            if (!text) {
                el.innerHTML = '<div class="loading">File not found</div>';
                return;
            }
            // Simple markdown rendering
            const html = text
                .replace(/^### (.+)$/gm, '<h3 style="color:#58a6ff;margin:8px 0">$1</h3>')
                .replace(/^## (.+)$/gm, '<h2 style="color:#58a6ff;margin:12px 0;font-size:16px">$1</h2>')
                .replace(/^# (.+)$/gm, '<h1 style="color:#58a6ff;margin:12px 0;font-size:18px">$1</h1>')
                .replace(/^- \[x\] (.+)$/gm, '<div class="task done">✅ $1</div>')
                .replace(/^- \[ \] (.+)$/gm, '<div class="task">⬜ $1</div>')
                .replace(/^- (.+)$/gm, '<div style="padding:2px 0;font-size:13px">• $1</div>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
            el.innerHTML = html;
        }

        async function refreshAll() {
            const [chatText, commits, tasksText, statusText] = await Promise.all([
                fetchFile('shared-context/chat.md'),
                fetchCommits(),
                fetchFile('shared-context/tasks.md'),
                fetchFile('shared-context/status.md')
            ]);
            renderChat(parseChat(chatText));
            renderCommits(commits);
            renderMarkdown(tasksText, 'tasks-body');
            renderMarkdown(statusText, 'status-body');
        }

        // Initial load
        refreshAll();
        // Auto-refresh every 30 seconds
        setInterval(refreshAll, 30000);
    </script>
</body>
</html>
