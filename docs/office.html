<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src https://api.github.com; img-src 'self' data:;">
<title>Pene Lab — HQ Virtual Office</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#0a0e14;color:#c8cfd8;height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}

.topbar{
    background:#11151c;border-bottom:1px solid #2a3144;
    padding:10px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10;
}
.topbar-left{display:flex;align-items:center;gap:14px}
.logo{font-size:18px;font-weight:800;background:linear-gradient(135deg,#8b5cf6,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.badge{font-size:10px;background:#232a3b;color:#6b7688;padding:3px 10px;border-radius:20px;border:1px solid #2a3144}
.nav-links{display:flex;gap:8px}
.nav-links a{color:#8b5cf6;text-decoration:none;font-size:11px;padding:4px 10px;border:1px solid #2a3144;border-radius:6px;transition:all .15s}
.nav-links a:hover{border-color:#8b5cf6;background:#8b5cf620}

/* Agent status bar */
.status-bar{
    display:flex;gap:12px;padding:8px 24px;background:#11151c;border-bottom:1px solid #2a3144;flex-shrink:0;overflow-x:auto;
}
.agent-status{
    display:flex;align-items:center;gap:8px;padding:6px 14px;
    background:#0a0e14;border:1px solid #2a3144;border-radius:10px;min-width:180px;
    transition:all .2s;cursor:pointer;
}
.agent-status:hover{border-color:#8b5cf650;transform:translateY(-1px)}
.agent-status .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.agent-status .dot.working{background:#10b981;box-shadow:0 0 8px #10b98180;animation:pulse 2s infinite}
.agent-status .dot.meeting{background:#f59e0b;box-shadow:0 0 8px #f59e0b80;animation:pulse 1.5s infinite}
.agent-status .dot.idle{background:#6b7688}
.agent-status .dot.offline{background:#ef4444}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.agent-status .info{flex:1}
.agent-status .name{font-size:12px;font-weight:700}
.agent-status .task{font-size:9px;color:#6b7688;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
.hermes-c{color:#8b5cf6} .jarvis-c{color:#06b6d4} .marco-c{color:#10b981} .gonzalo-c{color:#f59e0b}

/* Main area */
.main-area{flex:1;display:flex;overflow:hidden}
.canvas-wrap{flex:1;position:relative;overflow:hidden}
canvas{display:block;width:100%;height:100%}

/* Chat overlay */
.chat-overlay{
    position:absolute;bottom:0;left:0;right:0;
    background:linear-gradient(transparent, #0a0e14e0 30%, #0a0e14f0);
    padding:60px 20px 12px;pointer-events:none;
}
.chat-bubble-row{
    display:flex;align-items:flex-end;gap:8px;margin-bottom:8px;
    animation:chatIn .3s ease;pointer-events:auto;
}
@keyframes chatIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.chat-av-small{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;border:1.5px solid}
.chat-av-small.hermes{background:#8b5cf620;border-color:#8b5cf6}
.chat-av-small.jarvis{background:#06b6d420;border-color:#06b6d4}
.chat-av-small.marco{background:#10b98120;border-color:#10b981}
.chat-av-small.gonzalo{background:#f59e0b20;border-color:#f59e0b}
.chat-text{font-size:11px;background:#1a1f2e;border:1px solid #2a3144;border-radius:8px;padding:4px 10px;max-width:400px}

/* Side panel */
.side-panel{
    width:280px;background:#11151c;border-left:1px solid #2a3144;
    display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;
}
.side-header{padding:10px 14px;border-bottom:1px solid #2a3144;font-size:13px;font-weight:700}
.side-body{flex:1;overflow-y:auto;padding:10px}
.side-body::-webkit-scrollbar{width:3px}
.side-body::-webkit-scrollbar-thumb{background:#2a3144;border-radius:3px}
.activity-item{
    padding:8px;margin-bottom:6px;background:#0a0e14;border:1px solid #2a3144;border-radius:8px;font-size:11px;
    transition:border-color .2s;
}
.activity-item:hover{border-color:#8b5cf640}
.activity-item .agent{font-weight:700;font-size:10px}
.activity-item .action{color:#6b7688;margin-top:2px}
.activity-item .time{color:#4a5060;font-size:9px;float:right}

@media(max-width:900px){.side-panel{display:none}}
</style>
</head>
<body>

<div class="topbar">
    <div class="topbar-left">
        <span class="logo">⚡ PENE LAB HQ</span>
        <span class="badge">Virtual Office</span>
    </div>
    <div class="nav-links">
        <a href="index.html">📊 Dashboard</a>
        <a href="canvas.html">🗺️ Canvas</a>
    </div>
</div>

<div class="status-bar" id="status-bar">
    <div class="agent-status" onclick="focusAgent('hermes')">
        <div class="dot working" id="dot-hermes"></div>
        <div class="info"><div class="name hermes-c">🦅 Hermes</div><div class="task" id="task-hermes">Security hardening...</div></div>
    </div>
    <div class="agent-status" onclick="focusAgent('jarvis')">
        <div class="dot offline" id="dot-jarvis"></div>
        <div class="info"><div class="name jarvis-c">🤖 Jarvis</div><div class="task" id="task-jarvis">Offline</div></div>
    </div>
    <div class="agent-status" onclick="focusAgent('marco')">
        <div class="dot working" id="dot-marco"></div>
        <div class="info"><div class="name marco-c">👨‍💻 Marco</div><div class="task" id="task-marco">Reviewing dashboard</div></div>
    </div>
    <div class="agent-status" onclick="focusAgent('gonzalo')">
        <div class="dot idle" id="dot-gonzalo"></div>
        <div class="info"><div class="name gonzalo-c">👨‍🎨 Gonzalo</div><div class="task" id="task-gonzalo">Away</div></div>
    </div>
</div>

<div class="main-area">
    <div class="canvas-wrap">
        <canvas id="cv"></canvas>
        <div class="chat-overlay" id="chat-overlay"></div>
    </div>
    <div class="side-panel">
        <div class="side-header">📋 Activity Feed</div>
        <div class="side-body" id="activity-feed"></div>
    </div>
</div>

<script>
// ============================================================
// PENE LAB HQ — Isometric Virtual Office
// Pure Canvas, zero dependencies
// ============================================================

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

// --- Config ---
const TILE_W = 64;
const TILE_H = 32;
const FLOOR_COLS = 16;
const FLOOR_ROWS = 12;

// Colors
const C = {
    floor: '#d4c9a8', floorAlt: '#c9be9d', floorLine: '#b8ad8c',
    wall: '#8b8068', wallDark: '#6b6050', wallTop: '#9b9078',
    desk: '#5c4a32', deskTop: '#7a6548', deskLeg: '#4a3a28',
    chair: '#3a3a3a', chairSeat: '#4a4a4a',
    monitor: '#1a1a2e', monitorScreen: '#0f3460', monitorGlow: '#16213e',
    plant: '#2d6a4f', plantPot: '#8b6f47',
    rug: '#2a1f3d', rugBorder: '#3d2e5c',
    whiteboard: '#e8e8e8', whiteboardFrame: '#666',
    coffee: '#4a3728',
    hermes: '#8b5cf6', jarvis: '#06b6d4', marco: '#10b981', gonzalo: '#f59e0b',
    shadow: 'rgba(0,0,0,0.15)',
};

// --- Isometric helpers ---
function toIso(x, y) {
    return {
        x: (x - y) * TILE_W / 2,
        y: (x + y) * TILE_H / 2
    };
}

function toScreen(gx, gy) {
    const iso = toIso(gx, gy);
    return {
        x: iso.x + cv.width / 2,
        y: iso.y + 80
    };
}

// --- Drawing primitives ---
function drawDiamond(x, y, w, h, fill, stroke) {
    ctx.beginPath();
    ctx.moveTo(x, y - h/2);
    ctx.lineTo(x + w/2, y);
    ctx.lineTo(x, y + h/2);
    ctx.lineTo(x - w/2, y);
    ctx.closePath();
    if (fill) { ctx.fillStyle = fill; ctx.fill(); }
    if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 0.5; ctx.stroke(); }
}

function drawCube(sx, sy, w, h, d, topColor, leftColor, rightColor) {
    const hw = w/2, hh = h/2;
    // Top face
    ctx.beginPath();
    ctx.moveTo(sx, sy - d);
    ctx.lineTo(sx + hw, sy + hh/2 - d);
    ctx.lineTo(sx, sy + hh - d);
    ctx.lineTo(sx - hw, sy + hh/2 - d);
    ctx.closePath();
    ctx.fillStyle = topColor; ctx.fill();
    
    // Left face
    ctx.beginPath();
    ctx.moveTo(sx - hw, sy + hh/2 - d);
    ctx.lineTo(sx, sy + hh - d);
    ctx.lineTo(sx, sy + hh);
    ctx.lineTo(sx - hw, sy + hh/2);
    ctx.closePath();
    ctx.fillStyle = leftColor; ctx.fill();
    
    // Right face
    ctx.beginPath();
    ctx.moveTo(sx + hw, sy + hh/2 - d);
    ctx.lineTo(sx, sy + hh - d);
    ctx.lineTo(sx, sy + hh);
    ctx.lineTo(sx + hw, sy + hh/2);
    ctx.closePath();
    ctx.fillStyle = rightColor; ctx.fill();
}

// --- Floor ---
function drawFloor() {
    for (let r = 0; r < FLOOR_ROWS; r++) {
        for (let c = 0; c < FLOOR_COLS; c++) {
            const s = toScreen(c, r);
            const fill = (c + r) % 2 === 0 ? C.floor : C.floorAlt;
            drawDiamond(s.x, s.y, TILE_W, TILE_H, fill, C.floorLine);
        }
    }
}

// --- Walls ---
function drawWalls() {
    const wallH = 40;
    // Back wall (top-left edge)
    for (let c = 0; c < FLOOR_COLS; c++) {
        const s = toScreen(c, 0);
        // Wall segment
        ctx.beginPath();
        ctx.moveTo(s.x - TILE_W/2, s.y);
        ctx.lineTo(s.x, s.y - TILE_H/2);
        ctx.lineTo(s.x, s.y - TILE_H/2 - wallH);
        ctx.lineTo(s.x - TILE_W/2, s.y - wallH);
        ctx.closePath();
        ctx.fillStyle = C.wall; ctx.fill();
        ctx.strokeStyle = C.wallDark; ctx.lineWidth = 0.5; ctx.stroke();
    }
    // Left wall (top-right edge)
    for (let r = 0; r < FLOOR_ROWS; r++) {
        const s = toScreen(0, r);
        ctx.beginPath();
        ctx.moveTo(s.x - TILE_W/2, s.y);
        ctx.lineTo(s.x, s.y - TILE_H/2);
        ctx.lineTo(s.x, s.y - TILE_H/2 - wallH);
        ctx.lineTo(s.x - TILE_W/2, s.y - wallH);
        ctx.closePath();
        ctx.fillStyle = C.wallDark; ctx.fill();
        ctx.strokeStyle = '#5a5040'; ctx.lineWidth = 0.5; ctx.stroke();
    }
    // Wall top edge
    ctx.beginPath();
    const tl = toScreen(0, 0);
    const tr = toScreen(FLOOR_COLS, 0);
    const bl = toScreen(0, FLOOR_ROWS);
    ctx.moveTo(tl.x - TILE_W/2, tl.y - wallH);
    ctx.lineTo(tr.x, tr.y - TILE_H/2 - wallH);
    ctx.strokeStyle = C.wallTop; ctx.lineWidth = 2; ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(tl.x - TILE_W/2, tl.y - wallH);
    ctx.lineTo(bl.x - TILE_W/2, bl.y - wallH);
    ctx.stroke();
}

// --- Furniture ---
function drawDesk(gx, gy, color) {
    const s = toScreen(gx, gy);
    // Shadow
    ctx.globalAlpha = 0.1;
    drawDiamond(s.x + 2, s.y + 4, TILE_W * 0.8, TILE_H * 0.8, '#000');
    ctx.globalAlpha = 1;
    // Desk body
    drawCube(s.x, s.y, TILE_W * 0.7, TILE_H * 0.7, 14, C.deskTop, C.desk, C.desk);
    // Monitor
    const mx = s.x, my = s.y - 22;
    ctx.fillStyle = C.monitor;
    ctx.fillRect(mx - 8, my - 12, 16, 11);
    ctx.fillStyle = color || C.monitorScreen;
    ctx.fillRect(mx - 6, my - 10, 12, 7);
    // Monitor glow
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = color || '#0f3460';
    ctx.fillRect(mx - 7, my - 11, 14, 9);
    ctx.globalAlpha = 1;
    // Stand
    ctx.fillStyle = '#555';
    ctx.fillRect(mx - 1, my - 1, 2, 4);
}

function drawChair(gx, gy) {
    const s = toScreen(gx, gy);
    drawCube(s.x, s.y + 4, 18, 10, 6, C.chairSeat, C.chair, C.chair);
}

function drawMeetingTable(gx, gy) {
    const s = toScreen(gx + 1, gy + 0.5);
    // Large oval-ish table
    drawCube(s.x, s.y, TILE_W * 1.5, TILE_H * 1.2, 10, '#5a4a36', '#4a3a28', '#3a2a1a');
    // Label
    ctx.fillStyle = '#8b8068';
    ctx.font = '8px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('WAR ROOM', s.x, s.y - 14);
}

function drawPlant(gx, gy) {
    const s = toScreen(gx, gy);
    // Pot
    drawCube(s.x, s.y + 2, 14, 8, 8, '#9b7f57', C.plantPot, '#7a5f37');
    // Leaves
    const leaves = [[-4,-14],[0,-18],[4,-14],[-2,-16],[2,-16]];
    leaves.forEach(([dx, dy]) => {
        ctx.beginPath();
        ctx.arc(s.x + dx, s.y + dy, 4, 0, Math.PI * 2);
        ctx.fillStyle = C.plant; ctx.fill();
    });
}

function drawWhiteboard(gx, gy) {
    const s = toScreen(gx, gy);
    // Frame
    ctx.fillStyle = C.whiteboardFrame;
    ctx.fillRect(s.x - 20, s.y - 50, 40, 30);
    ctx.fillStyle = C.whiteboard;
    ctx.fillRect(s.x - 18, s.y - 48, 36, 26);
    // Some "writing" lines
    ctx.strokeStyle = '#aaa';
    ctx.lineWidth = 0.5;
    for (let i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.moveTo(s.x - 14, s.y - 44 + i * 6);
        ctx.lineTo(s.x - 14 + Math.random() * 24, s.y - 44 + i * 6);
        ctx.stroke();
    }
}

function drawCoffeeMachine(gx, gy) {
    const s = toScreen(gx, gy);
    drawCube(s.x, s.y, 16, 10, 18, '#3a3028', C.coffee, '#3a2718');
    ctx.fillStyle = '#ff6b35';
    ctx.beginPath(); ctx.arc(s.x, s.y - 14, 2, 0, Math.PI * 2); ctx.fill();
}

function drawRug(gx, gy, w, h) {
    for (let r = 0; r < h; r++) {
        for (let c = 0; c < w; c++) {
            const s = toScreen(gx + c, gy + r);
            const isEdge = r === 0 || r === h-1 || c === 0 || c === w-1;
            drawDiamond(s.x, s.y, TILE_W - 2, TILE_H - 2, isEdge ? C.rugBorder : C.rug);
        }
    }
}

// --- Agents ---
const agents = {
    hermes: { gx: 3, gy: 3, targetGx: 3, targetGy: 3, color: C.hermes, emoji: '🦅', label: 'Hermes', status: 'working', task: 'Security hardening', desk: {x:3,y:2} },
    jarvis: { gx: 7, gy: 3, targetGx: 7, targetGy: 3, color: C.jarvis, emoji: '🤖', label: 'Jarvis', status: 'offline', task: 'Offline', desk: {x:7,y:2} },
    marco:  { gx: 11, gy: 3, targetGx: 11, targetGy: 3, color: C.marco, emoji: '👨‍💻', label: 'Marco', status: 'working', task: 'Reviewing dashboard', desk: {x:11,y:2} },
    gonzalo:{ gx: 13, gy: 6, targetGx: 13, targetGy: 6, color: C.gonzalo, emoji: '👨‍🎨', label: 'Gonzalo', status: 'idle', task: 'Away', desk: {x:13,y:5} },
};

// Smooth movement
function moveAgents() {
    Object.values(agents).forEach(a => {
        const dx = a.targetGx - a.gx;
        const dy = a.targetGy - a.gy;
        a.gx += dx * 0.05;
        a.gy += dy * 0.05;
    });
}

// Wander behavior for non-working agents
function agentBehavior() {
    Object.entries(agents).forEach(([key, a]) => {
        if (a.status === 'working') {
            // Go to desk
            a.targetGx = a.desk.x;
            a.targetGy = a.desk.y + 1;
        } else if (a.status === 'meeting') {
            // Go to war room
            a.targetGx = 7 + (Math.random() - 0.5) * 2;
            a.targetGy = 8 + (Math.random() - 0.5) * 2;
        } else if (a.status === 'idle') {
            // Wander occasionally
            if (Math.random() < 0.1) {
                a.targetGx = a.desk.x + (Math.random() - 0.5) * 4;
                a.targetGy = a.desk.y + (Math.random() - 0.5) * 3 + 1;
                a.targetGx = Math.max(1, Math.min(FLOOR_COLS - 1, a.targetGx));
                a.targetGy = Math.max(1, Math.min(FLOOR_ROWS - 1, a.targetGy));
            }
        }
        // Offline agents stay at desk but dimmed
        if (a.status === 'offline') {
            a.targetGx = a.desk.x;
            a.targetGy = a.desk.y + 1;
        }
    });
}

function drawAgent(a) {
    const s = toScreen(a.gx, a.gy);
    const isOffline = a.status === 'offline';
    ctx.globalAlpha = isOffline ? 0.35 : 1;
    
    // Shadow
    ctx.globalAlpha *= 0.2;
    ctx.beginPath();
    ctx.ellipse(s.x, s.y + 2, 10, 5, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#000'; ctx.fill();
    ctx.globalAlpha = isOffline ? 0.35 : 1;
    
    // Body (simple isometric character)
    // Legs
    ctx.fillStyle = '#2a2a3a';
    ctx.fillRect(s.x - 4, s.y - 8, 3, 8);
    ctx.fillRect(s.x + 1, s.y - 8, 3, 8);
    
    // Torso
    ctx.fillStyle = a.color;
    ctx.beginPath();
    ctx.roundRect(s.x - 6, s.y - 22, 12, 14, 2);
    ctx.fill();
    
    // Head
    ctx.fillStyle = '#e8c9a0';
    ctx.beginPath();
    ctx.arc(s.x, s.y - 28, 6, 0, Math.PI * 2);
    ctx.fill();
    
    // Eyes (tiny dots)
    ctx.fillStyle = '#333';
    ctx.fillRect(s.x - 3, s.y - 29, 1.5, 1.5);
    ctx.fillRect(s.x + 1.5, s.y - 29, 1.5, 1.5);
    
    // Status glow ring
    if (!isOffline) {
        ctx.beginPath();
        ctx.arc(s.x, s.y - 28, 8, 0, Math.PI * 2);
        ctx.strokeStyle = a.color;
        ctx.lineWidth = 1.5;
        ctx.globalAlpha = 0.4 + Math.sin(Date.now() / 500) * 0.2;
        ctx.stroke();
        ctx.globalAlpha = isOffline ? 0.35 : 1;
    }
    
    // Name label
    ctx.font = 'bold 9px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#0a0e14';
    ctx.globalAlpha = 0.6;
    const nameW = ctx.measureText(a.label).width + 8;
    ctx.fillRect(s.x - nameW/2, s.y - 42, nameW, 12);
    ctx.globalAlpha = isOffline ? 0.35 : 1;
    ctx.fillStyle = a.color;
    ctx.fillText(a.label, s.x, s.y - 33);
    
    // Speech bubble with current task
    if (a.status === 'working' && a.task) {
        const bubbleY = s.y - 54;
        ctx.font = '8px sans-serif';
        const tw = ctx.measureText(a.task).width + 12;
        
        // Bubble background
        ctx.fillStyle = '#1a1f2e';
        ctx.globalAlpha = 0.9;
        ctx.beginPath();
        ctx.roundRect(s.x - tw/2, bubbleY - 8, tw, 14, 4);
        ctx.fill();
        ctx.strokeStyle = a.color + '60';
        ctx.lineWidth = 0.5;
        ctx.stroke();
        
        // Bubble tail
        ctx.beginPath();
        ctx.moveTo(s.x - 3, bubbleY + 6);
        ctx.lineTo(s.x, bubbleY + 10);
        ctx.lineTo(s.x + 3, bubbleY + 6);
        ctx.fillStyle = '#1a1f2e'; ctx.fill();
        
        ctx.globalAlpha = isOffline ? 0.35 : 1;
        ctx.fillStyle = '#c8cfd8';
        ctx.fillText(a.task, s.x, bubbleY + 2);
    }
    
    ctx.globalAlpha = 1;
}

// --- Room labels ---
function drawRoomLabels() {
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.globalAlpha = 0.4;
    
    // Workspace area
    const ws = toScreen(7, 2);
    ctx.fillStyle = '#c8cfd8';
    ctx.fillText('WORKSPACE', ws.x, ws.y - 50);
    
    // War room
    const wr = toScreen(7, 8);
    ctx.fillStyle = '#c8cfd8';
    ctx.fillText('WAR ROOM', wr.x, wr.y - 16);
    
    // Lounge
    const lg = toScreen(13, 8);
    ctx.fillStyle = '#c8cfd8';
    ctx.fillText('LOUNGE', lg.x, lg.y - 16);
    
    ctx.globalAlpha = 1;
}

// --- Main draw ---
function draw() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    
    // Background gradient
    const grad = ctx.createLinearGradient(0, 0, 0, cv.height);
    grad.addColorStop(0, '#0a0e14');
    grad.addColorStop(1, '#111520');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, cv.width, cv.height);
    
    // Draw floor rugs first (under floor)
    drawRug(5, 7, 5, 3);  // War room rug
    drawRug(12, 7, 3, 3); // Lounge rug
    
    // Floor
    drawFloor();
    
    // Walls
    drawWalls();
    
    // Room labels
    drawRoomLabels();
    
    // Furniture — desks row
    drawDesk(3, 2, C.hermes);
    drawChair(3, 3);
    drawDesk(5, 2, C.jarvis);  
    drawChair(5, 3);
    drawDesk(7, 2, C.jarvis);
    drawChair(7, 3);
    drawDesk(9, 2, C.marco);
    drawChair(9, 3);
    drawDesk(11, 2, C.marco);
    drawChair(11, 3);
    drawDesk(13, 2, C.gonzalo);
    drawChair(13, 3);
    
    // War room
    drawMeetingTable(6, 8);
    drawChair(5.5, 8);
    drawChair(8.5, 8);
    drawChair(7, 7);
    drawChair(7, 9.5);
    
    // Decorations
    drawPlant(1, 1);
    drawPlant(14, 1);
    drawPlant(1, 10);
    drawWhiteboard(2, 0.5);
    drawCoffeeMachine(14, 5);
    drawPlant(10, 6);
    
    // Lounge furniture
    drawCube(toScreen(12.5, 8).x, toScreen(12.5, 8).y, 30, 16, 8, '#3a2a4a', '#2a1a3a', '#2a1a3a'); // Couch
    drawCube(toScreen(13.5, 9).x, toScreen(13.5, 9).y, 20, 12, 6, '#3a2a4a', '#2a1a3a', '#2a1a3a'); // Chair
    
    // Agents (sorted by Y for depth)
    const sorted = Object.values(agents).sort((a, b) => (a.gy + a.gx) - (b.gy + b.gx));
    sorted.forEach(drawAgent);
    
    moveAgents();
    requestAnimationFrame(draw);
}

// --- Resize ---
function resize() {
    cv.width = cv.parentElement.clientWidth;
    cv.height = cv.parentElement.clientHeight;
}
window.addEventListener('resize', resize);

// --- Focus on agent ---
function focusAgent(name) {
    const a = agents[name];
    if (!a) return;
    // Flash effect
    const orig = a.color;
    a.color = '#ffffff';
    setTimeout(() => a.color = orig, 200);
}

// --- Data from GitHub ---
const API = 'https://api.github.com/repos/marcomendezz/pene-lab-collab';

async function fetchFile(path) {
    try {
        const r = await fetch(`${API}/contents/${path}`, {
            headers: {'Accept': 'application/vnd.github.v3.raw'},
            cache: 'no-store'
        });
        return r.ok ? await r.text() : null;
    } catch(e) { return null; }
}

function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

async function loadActivity() {
    const chatText = await fetchFile('shared-context/chat.md');
    if (!chatText) return;
    
    const msgs = [];
    for (const line of chatText.split('\n')) {
        const m = line.match(/^\[(.+?)\]\s+(\w+):\s+(.+)$/);
        if (m) msgs.push({time: m[1], agent: m[2].toLowerCase(), text: m[3]});
    }
    
    // Update activity feed
    const feed = document.getElementById('activity-feed');
    const recent = msgs.slice(-15).reverse();
    feed.innerHTML = recent.map(m => {
        const colorClass = ['hermes','atheon'].includes(m.agent) ? 'hermes-c' : 
                           m.agent === 'jarvis' ? 'jarvis-c' : 
                           m.agent === 'marco' ? 'marco-c' : 
                           m.agent === 'gonzalo' ? 'gonzalo-c' : '';
        return `<div class="activity-item">
            <span class="agent ${colorClass}">${esc(m.agent.toUpperCase())}</span>
            <span class="time">${esc(m.time.split(' ').pop() || m.time)}</span>
            <div class="action">${esc(m.text.substring(0, 80))}</div>
        </div>`;
    }).join('');
    
    // Update chat overlay with last 3 messages
    const overlay = document.getElementById('chat-overlay');
    const last3 = msgs.slice(-3);
    overlay.innerHTML = last3.map(m => {
        const cls = ['hermes','atheon'].includes(m.agent) ? 'hermes' : 
                    m.agent === 'jarvis' ? 'jarvis' : 
                    m.agent === 'marco' ? 'marco' : 
                    m.agent === 'gonzalo' ? 'gonzalo' : 'hermes';
        const em = cls === 'hermes' ? '🦅' : cls === 'jarvis' ? '🤖' : cls === 'marco' ? '👨‍💻' : '👨‍🎨';
        return `<div class="chat-bubble-row">
            <div class="chat-av-small ${cls}">${em}</div>
            <div class="chat-text"><strong style="color:var(--${cls === 'hermes' ? '8b5cf6' : cls === 'jarvis' ? '06b6d4' : cls === 'marco' ? '10b981' : 'f59e0b'})">${esc(m.agent.toUpperCase())}</strong>: ${esc(m.text.substring(0, 100))}</div>
        </div>`;
    }).join('');
    
    // Detect agent activity from recent messages
    const now = Date.now();
    const recentAgents = {};
    msgs.slice(-10).forEach(m => {
        recentAgents[m.agent] = m.text;
    });
    
    if (recentAgents.hermes || recentAgents.atheon) {
        agents.hermes.status = 'working';
        agents.hermes.task = (recentAgents.hermes || recentAgents.atheon || '').substring(0, 30);
        document.getElementById('dot-hermes').className = 'dot working';
        document.getElementById('task-hermes').textContent = agents.hermes.task;
    }
    if (recentAgents.jarvis) {
        agents.jarvis.status = 'working';
        agents.jarvis.task = (recentAgents.jarvis || '').substring(0, 30);
        document.getElementById('dot-jarvis').className = 'dot working';
        document.getElementById('task-jarvis').textContent = agents.jarvis.task;
    }
}

// --- Behavior loop ---
setInterval(agentBehavior, 2000);
setInterval(loadActivity, 20000);

// --- Init ---
resize();
loadActivity();
draw();
</script>
