<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#2a1a44" stroke="#7b2ff7" stroke-width="3"/>
  <!-- Winged helmet -->
  <path d="M50 90 Q50 45 100 35 Q150 45 150 90 L150 115 Q150 135 130 140 L70 140 Q50 135 50 115 Z" fill="#3a2a5a" stroke="#7b2ff7" stroke-width="2"/>
  <!-- Wings -->
  <path d="M45 70 Q20 50 15 30 Q25 45 50 60" fill="none" stroke="#7b2ff7" stroke-width="2.5"/>
  <path d="M40 75 Q15 60 10 40 Q20 55 45 70" fill="none" stroke="#7b2ff7" stroke-width="2"/>
  <path d="M155 70 Q180 50 185 30 Q175 45 150 60" fill="none" stroke="#7b2ff7" stroke-width="2.5"/>
  <path d="M160 75 Q185 60 190 40 Q180 55 155 70" fill="none" stroke="#7b2ff7" stroke-width="2"/>
  <!-- Visor -->
  <path d="M60 78 Q60 58 100 48 Q140 58 140 78 L140 98 Q140 108 120 110 L80 110 Q60 108 60 98 Z" fill="#7b2ff7" opacity="0.3" stroke="#7b2ff7" stroke-width="1.5"/>
  <!-- Eyes -->
  <ellipse cx="80" cy="83" rx="12" ry="8" fill="#7b2ff7" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2.5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="120" cy="83" rx="12" ry="8" fill="#7b2ff7" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="2.5s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Mouth -->
  <line x1="75" y1="103" x2="125" y2="103" stroke="#7b2ff7" stroke-width="2" opacity="0.6"/>
  <!-- Caduceus symbol small -->
  <line x1="100" y1="35" x2="100" y2="15" stroke="#7b2ff7" stroke-width="2"/>
  <circle cx="100" cy="12" r="4" fill="#7b2ff7">
    <animate attributeName="r" values="4;6;4" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <!-- Name -->
  <text x="100" y="170" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#7b2ff7">HERMES</text>
</svg>
