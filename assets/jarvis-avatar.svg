<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#1a2744" stroke="#00d2ff" stroke-width="3"/>
  <!-- Helmet -->
  <path d="M50 90 Q50 40 100 30 Q150 40 150 90 L150 120 Q150 140 130 145 L70 145 Q50 140 50 120 Z" fill="#2a3a5a" stroke="#00d2ff" stroke-width="2"/>
  <!-- Visor -->
  <path d="M60 80 Q60 60 100 50 Q140 60 140 80 L140 100 Q140 110 120 112 L80 112 Q60 110 60 100 Z" fill="#00d2ff" opacity="0.3" stroke="#00d2ff" stroke-width="1.5"/>
  <!-- Eyes -->
  <ellipse cx="80" cy="85" rx="12" ry="8" fill="#00d2ff" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="120" cy="85" rx="12" ry="8" fill="#00d2ff" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0.4;0.9" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Mouth line -->
  <line x1="75" y1="105" x2="125" y2="105" stroke="#00d2ff" stroke-width="2" opacity="0.6"/>
  <!-- Antenna -->
  <line x1="100" y1="30" x2="100" y2="15" stroke="#00d2ff" stroke-width="2"/>
  <circle cx="100" cy="12" r="4" fill="#00d2ff">
    <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- J letter -->
  <text x="100" y="170" text-anchor="middle" font-family="monospace" font-size="24" font-weight="bold" fill="#00d2ff">JARVIS</text>
</svg>
